<div class="flex flex-col gap-3 w-25">
  @if (show()) {
    <div
      class="h-[70px]"
      [animeEnter]="{
        height: [0, 70],
        ease: 'outBack(1.7)',
        duration: 150,
      }"
      [animeLeave]="{
        height: 0,
        ease: 'inBack(1.7)',
        duration: 200
      }"
    >
      <div #animeEl class="w-full h-full" [animeEnter]="loopAnime">
        <img class="w-full h-full" src="angular-logo.svg" alt="angular logo">
      </div>
    </div>
  }

  <footer class="flex justify-center gap-2">
    <button class="btn btn-ghost" (click)="show.set(!show())">
      {{ show() ? 'Hide' : 'Show' }}
    </button>
    <button class="btn btn-ghost" [disabled]="!show()" (click)="rotations.set(rotations() + 1)">
      Rotate
    </button>
  </footer>
</div>
